<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT</title>
  <link rel="stylesheet" href="chatgpt.css">
  <link rel="icon" href="../ducami_img/chatgpt.jpg">

</head>
<body>
  <div id="wp">
    <aside id="sd">
      <img src="../ducami_img/chatgpt.jpg" id="logo">
      <div class="top">
        <div class="n-bt">새 채팅</div>
        <div class="s-bt">채팅 검색</div>
      </div>
      <nav class="lst">
        <div class="sect">
          <p class="title">최근</p>
          <ul>
            <li>중간고사 성적 고민</li>
            <li>JavaScript</li>
          </ul>
        </div>
      </nav>
      <div class="u-info">
        <div class="prof">남성윤</div>
      </div>
    </aside>

    <main id="mn">
      <header id="hd">
        <div class="m-sel" id="dd"><button class="tit_bt"> ChatGPT  v</button></div>
      </header>

      <div class="cnt">
        <h2 class="msg">지금 무슨 생각을 하시나요?</h2>
        <div class="in-area">
          <div class="in-wp">
            <span class="plus">+</span>
            <input type="text" placeholder="무엇이든 물어보세요">
            <div class="btns">음성</div>
          </div>
          <div class="t">
            <button class="t-bt"><img src="../ducami_img/edit.png" id="img_img">이미지 만들기</button>
            <button class="t-bt">글쓰기 또는 편집</button>
            <button class="t-bt">필요한 항목 찾기</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
